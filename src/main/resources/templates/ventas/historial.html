<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Historial de Ventas - Fantasía</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: linear-gradient(135deg, #ffe5ec 0%, #c9e4de 50%, #dbcdf0 100%); font-family: 'Fredoka', sans-serif; min-height: 100vh; padding-bottom: 50px; }
        .bubble-card { background: #fff; border-radius: 24px; border: 4px solid #f7d6e0; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .text-purple { color: #6c5ce7; }
        .text-cyan { color: #2bcbba; }
        .btn-outline-purple { border: 1px solid #6c5ce7; color: #6c5ce7; }
        .btn-outline-purple:hover { background: #6c5ce7; color: #fff; }
        .table-container { overflow-x: auto; }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <a th:href="@{/dashboard}" class="btn btn-outline-secondary btn-sm rounded-pill mb-2">
                <i class="fa-solid fa-arrow-left"></i> Volver al Dashboard
            </a>
            <h2 class="fw-bold text-purple">👑 Historial del Cofre Mágico</h2>
        </div>
        <a th:href="@{/ventas/nueva}" class="btn btn-outline-primary rounded-pill fw-bold px-4">
            <i class="fa-solid fa-plus"></i> Nueva Venta
        </a>
    </div>

    <div class="bubble-card mb-4">
        <form th:action="@{/ventas/lista}" method="get" class="row g-3">
            <div class="col-md-4"><input type="text" name="comprador" th:value="${comprador}" class="form-control rounded-pill" placeholder="🔍 Nombre del cliente..."></div>
            <div class="col-md-3"><input type="date" name="fechaInicio" th:value="${fechaInicio}" class="form-control rounded-pill"></div>
            <div class="col-md-3"><input type="date" name="fechaFin" th:value="${fechaFin}" class="form-control rounded-pill"></div>
            <div class="col-md-2"><button type="submit" class="btn btn-primary rounded-pill w-100">Buscar</button></div>
        </form>
    </div>

    <div class="bubble-card">
        <div class="table-container">
            <table class="table table-hover align-middle">
                <thead>
                <tr><th>Fecha</th><th>Cliente</th><th>Total</th><th class="text-center">Acciones</th></tr>
                </thead>
                <tbody>
                <tr th:each="venta : ${listaVentas}">
                    <td th:text="${#temporals.format(venta.fechaVenta, 'dd/MM/yyyy')}"></td>
                    <td th:text="${venta.cliente.nombre}"></td>
                    <td class="text-cyan fw-bold">S/. <span th:text="${#numbers.formatDecimal(venta.total, 1, 'COMMA', 2, 'POINT')}"></span></td>
                    <td class="text-center">
                        <a th:href="@{/ventas/detalle/{id}(id=${venta.id})}" class="btn btn-sm btn-outline-purple rounded-pill me-1">
                            <i class="fa-solid fa-eye"></i>
                        </a>
                        <button type="button" class="btn btn-sm btn-outline-danger rounded-pill btn-eliminar-venta"
                                th:data-id="${venta.id}" th:data-cliente="${venta.cliente.nombre}">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                        <form th:id="'deleteFormVenta' + ${venta.id}" th:action="@{/ventas/eliminar/{id}(id=${venta.id})}" method="post" style="display:none;"></form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.btn-eliminar-venta').forEach(button => {
            button.addEventListener('click', function() {
                const id = this.getAttribute('data-id');
                const cliente = this.getAttribute('data-cliente');

                Swal.fire({
                    title: '¿Anular esta venta?',
                    text: "La venta de '" + cliente + "' será eliminada del historial.",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#ff7675',
                    cancelButtonColor: '#b2bec3',
                    confirmButtonText: 'Sí, borrar'
                }).then((result) => {
                    if (result.isConfirmed) {
                        document.getElementById('deleteFormVenta' + id).submit();
                    }
                });
            });
        });
    });
</script>
</body>
</html>
