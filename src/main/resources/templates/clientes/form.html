<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Cliente - El Paraíso de la Fantasía</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #c9e4de 50%, #dbcdf0 100%);
            font-family: 'Fredoka', sans-serif;
            min-height: 100vh;
            padding-top: 40px;
        }

        .bubble-card {
            background-color: #ffffff;
            border-radius: 24px;
            border: 4px solid #f7d6e0;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.08);
            position: relative;
            overflow: hidden;
        }

        .bubble-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 8px;
            background: linear-gradient(90deg, #ff99c8, #fcf6bd, #d0f4de, #a9def9, #e4c1f9);
        }

        .text-purple { color: #6c5ce7; }
        .form-control { border-radius: 12px; border: 2px solid #e8e5ff; }
        .form-control:focus { border-color: #6c5ce7; box-shadow: none; }
        .btn-primary { background-color: #6c5ce7; border: none; border-radius: 50px; }
        .btn-secondary { background-color: #f7d6e0; border: none; border-radius: 50px; color: #6c5ce7; }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="bubble-card p-4 p-md-5">
        <h2 class="fw-bold text-purple mb-4" th:text="${cliente.id == null} ? '👤 Registrar Nuevo Cliente' : '✏️ Editar Cliente'">Cliente</h2>

        <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Nombre Completo *</label>
                    <input type="text" th:field="*{nombre}" class="form-control" required placeholder="Nombre del cliente">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Teléfono *</label>
                    <input type="text" th:field="*{telefono}" class="form-control" required placeholder="Ej: 999111222">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Correo Electrónico</label>
                <input type="email" th:field="*{correo}" class="form-control" placeholder="correo@ejemplo.com">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Dirección</label>
                <input type="text" th:field="*{direccion}" class="form-control" placeholder="Av. Principal 123">
            </div>

            <div class="d-flex justify-content-between mt-4">
                <a th:href="@{/clientes}" class="btn btn-secondary px-4 fw-bold">Cancelar</a>
                <button type="submit" class="btn btn-primary px-4 fw-bold">Guardar Datos</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
