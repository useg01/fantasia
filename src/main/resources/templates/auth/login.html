<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Fantasía Piñatería</title>
    <link rel="icon" href="img/LogoPiñateria.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/global.css}">

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;

            background:
            linear-gradient(
                135deg,
                #ff8fab 0%,
                #ffc8dd 30%,
                #cdb4db 60%,
                #a2d2ff 100%
            );

            overflow:hidden;
            position:relative;
        }

        body::before{
            content:'';
            position:absolute;
            width:350px;
            height:350px;
            background:rgba(255,255,255,.15);
            border-radius:50%;
            top:-120px;
            left:-120px;
        }

        body::after{
            content:'';
            position:absolute;
            width:450px;
            height:450px;
            background:rgba(255,255,255,.12);
            border-radius:50%;
            bottom:-180px;
            right:-180px;
        }

        .login-container{

            width:100%;
            max-width:430px;

            background:rgba(255,255,255,.92);
            backdrop-filter:blur(15px);
            border-radius:30px;
            padding:45px 35px;
            box-shadow:
            0 20px 40px rgba(0,0,0,.15);
            text-align:center;
            position:relative;
            z-index:2;
            animation:fadeIn .7s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(25px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .logo-container{
            margin-bottom:15px;
        }

        .logo-container img{
            width:120px;
            height:120px;
            object-fit:contain;
            border-radius:50%;
            background:white;
            padding:10px;
            box-shadow:
            0 10px 25px rgba(0,0,0,.10);
        }

        h2{
            color:#5a189a;
            font-size:30px;
            font-weight:700;
            margin-bottom:5px;
        }

        .subtitle{
            color:#666;
            font-size:14px;
            margin-bottom:30px;
        }

        .form-group{
            margin-bottom:20px;
            text-align:left;
        }

        .form-group label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#444;
        }

        .input-box{
            position:relative;
        }

        .input-box span{
            position:absolute;
            left:15px;
            top:50%;
            transform:translateY(-50%);
            font-size:18px;
        }

        .input-box input{
            width:100%;
            padding:15px 15px 15px 50px;
            border:2px solid #ececec;
            border-radius:15px;
            font-size:15px;
            transition:.3s;
            outline:none;
        }

        .input-box input:focus{
            border-color:#a855f7;
            box-shadow:
            0 0 0 4px rgba(168,85,247,.15);
        }

        button{

            width:100%;
            padding:15px;
            border:none;
            border-radius:15px;
            background:
            linear-gradient(
                135deg,
                #7b2cbf,
                #9d4edd
            );
            color:white;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            transform:translateY(-2px);
            box-shadow:
            0 12px 25px rgba(123,44,191,.35);
        }

        .alert{
            margin-top:20px;
            padding:12px;
            border-radius:12px;
            font-size:14px;
            font-weight:600;
        }
        .alert-error{
            background:#ffe5e5;
            color:#d90429;
        }
        .alert-logout{
            background:#e8f5e9;
            color:#2e7d32;
        }

        .footer-text{
            margin-top:25px;
            font-size:12px;
            color:#888;
        }

        @media(max-width:480px){
            .login-container{
                padding:35px 25px;
            }
            h2{
                font-size:24px;
            }
            .logo-container img{
                width:100px;
                height:100px;
            }
        }

    </style>
</head>

<body>

<div class="login-container">
    <div class="logo-container">
        <img src="img/LogoPiñateria.png" alt="Logo Fantasía">
    </div>

    <h2>Paraiso de la fantasia</h2>
    <p class="subtitle">
        Sistema de Gestión Comercial
    </p>
    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Usuario</label>
            <div class="input-box">
                <span>👤</span>

                <input
                        type="text"
                        name="username"
                        placeholder="Ingrese su usuario"
                        required>

            </div>

        </div>

        <div class="form-group">

            <label>Contraseña</label>

            <div class="input-box">

                <span>🔒</span>

                <input
                        type="password"
                        name="password"
                        placeholder="Ingrese su contraseña"
                        required>

            </div>

        </div>

        <button type="submit">
            Iniciar Sesión
        </button>

    </form>

    <div th:if="${param.error}" class="alert alert-error">
        Usuario o contraseña incorrectos
    </div>

    <div th:if="${param.logout}" class="alert alert-logout">
        Sesión cerrada correctamente
    </div>

    <div class="footer-text">
        © 2026 Fantasía Piñatería
    </div>

</div>

<script th:src="@{/js/theme-switcher.js}"></script>

</body>
</html>
